name: Debug Build

on:
  pull_request:
    branches: [main, master]

jobs:
  debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./calculadora
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm --version
      - run: node --version
      - run: ls -la
      - run: npm ci
      - run: npm run build
